name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: |
          python -m pip install --upgrade pip
          pip install streamlit pymupdf pillow

      - name: Syntakssjekk
        run: |
          python -m py_compile app.py
          python -m py_compile omr.py
          python -m py_compile audiveris.py
